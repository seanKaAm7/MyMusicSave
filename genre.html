<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>장르 — MyMusicSave</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* ── 헤더 ─────────────────────────────────────────── */
    .genre-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 2.5rem;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,10,10,0.95);
      backdrop-filter: blur(16px);
    }
    .genre-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      letter-spacing: 0.12em;
      color: var(--text);
      text-decoration: none;
    }
    .btn-back {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      padding: 0.38rem 0.85rem;
      cursor: pointer;
      font-family: inherit;
      text-transform: uppercase;
      text-decoration: none;
    }
    .btn-back:hover { color: var(--text); border-color: var(--text); }

    /* ── 히어로 ───────────────────────────────────────── */
    .genre-hero {
      padding: 3rem 2.5rem 2rem;
      border-bottom: 1px solid var(--border);
    }
    .genre-hero-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }
    .genre-hero-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 8vw, 6rem);
      letter-spacing: 0.04em;
      line-height: 1;
      margin-bottom: 0.75rem;
    }
    .genre-hero-stats {
      display: flex;
      gap: 2rem;
      align-items: baseline;
    }
    .genre-hero-stat {
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      color: var(--text-muted);
      letter-spacing: 0.06em;
    }
    .genre-hero-stat strong {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      color: var(--text);
      letter-spacing: 0.04em;
      margin-right: 0.3rem;
    }

    /* ── 툴바 ─────────────────────────────────────────── */
    .genre-toolbar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 1rem 2.5rem;
      border-bottom: 1px solid var(--border);
    }
    .sort-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.08em;
      padding: 0.35rem 0.75rem;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.15s;
    }
    .sort-btn:hover { color: var(--text-dim); border-color: var(--text-dim); }
    .sort-btn.active { color: var(--text); border-color: var(--text); }

    /* ── 메인 영역 ─────────────────────────────────────── */
    .genre-main {
      padding: 2rem 2.5rem 4rem;
    }

    /* ── 앨범 그리드 ───────────────────────────────────── */
    .genre-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 1.2rem;
      margin-bottom: 3rem;
    }
    .genre-album-card {
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .genre-album-art {
      aspect-ratio: 1;
      overflow: hidden;
      background: var(--border);
      margin-bottom: 0.5rem;
      position: relative;
    }
    .genre-album-art img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.25s ease;
    }
    .genre-album-card:hover .genre-album-art img { transform: scale(1.05); }
    .genre-album-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.04em;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .genre-album-artist {
      font-size: 0.68rem;
      color: var(--text-muted);
      margin-top: 0.1rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .genre-album-year {
      font-family: 'Space Mono', monospace;
      font-size: 0.58rem;
      color: var(--text-muted);
      margin-top: 0.1rem;
    }

    /* ── Top Artists ───────────────────────────────────── */
    .genre-section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }
    .artist-list {
      display: flex;
      flex-direction: column;
      gap: 0;
      max-width: 560px;
    }
    .artist-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 0.7rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      transition: opacity 0.15s;
    }
    .artist-row:hover { opacity: 0.7; }
    .artist-row-left {
      display: flex;
      align-items: baseline;
      gap: 1rem;
    }
    .artist-rank {
      font-family: 'Space Mono', monospace;
      font-size: 0.62rem;
      color: var(--text-muted);
      width: 1.5rem;
      text-align: right;
    }
    .artist-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.06em;
    }
    .artist-count {
      font-family: 'Space Mono', monospace;
      font-size: 0.62rem;
      color: var(--text-muted);
    }

    /* ── 빈 상태 ───────────────────────────────────────── */
    .genre-empty {
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      color: var(--text-muted);
      padding: 3rem 0;
      letter-spacing: 0.04em;
    }

    @media (max-width: 600px) {
      .genre-header, .genre-hero, .genre-toolbar, .genre-main { padding-left: 1.5rem; padding-right: 1.5rem; }
      .genre-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 0.8rem; }
    }
  </style>
</head>
<body>

  <header class="genre-header">
    <a class="genre-logo" href="/dashboard.html">MYMUSICSAVE</a>
    <a class="btn-back" href="/dashboard.html">대시보드</a>
  </header>

  <div class="genre-hero">
    <div class="genre-hero-label">GENRE</div>
    <div class="genre-hero-name" id="genre-name">—</div>
    <div class="genre-hero-stats">
      <div class="genre-hero-stat"><strong id="stat-albums">—</strong>ALBUMS</div>
      <div class="genre-hero-stat"><strong id="stat-artists">—</strong>ARTISTS</div>
    </div>
  </div>

  <div class="genre-toolbar">
    <button class="sort-btn active" data-sort="year">연도순</button>
    <button class="sort-btn" data-sort="added">추가순</button>
    <button class="sort-btn" data-sort="artist">아티스트순</button>
    <button class="sort-btn" data-sort="title">제목순</button>
  </div>

  <main class="genre-main">
    <div class="genre-grid" id="album-grid">
      <div class="genre-empty">불러오는 중...</div>
    </div>

    <div id="top-artists-section" style="display:none">
      <div class="genre-section-title">Top Artists</div>
      <div class="artist-list" id="artist-list"></div>
    </div>
  </main>

  <script>
    const SUPABASE_URL = 'https://aanldsddamkjrziefhuf.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFhbmxkc2RkYW1ranJ6aWVmaHVmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMzg3NDYsImV4cCI6MjA4OTgxNDc0Nn0.N7uKqkjxrAtjvumwW-W5VH5qxCE4RtxKymNWfP097iY';

    const GENRE_DISPLAY = {
      'hip-hop': 'HIP-HOP', 'rnb': 'R&B', 'kpop': 'K-POP', 'pop': 'POP',
      'rock': 'ROCK', 'alternative': 'ALTERNATIVE', 'electronic': 'ELECTRONIC',
      'jazz': 'JAZZ', 'classical': 'CLASSICAL', 'soul': 'SOUL',
      'soundtrack': 'SOUNDTRACK', 'other': 'OTHER'
    };

    function escHtml(str) {
      return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    const token = localStorage.getItem('mms_access_token');
    const user = JSON.parse(localStorage.getItem('mms_user') || 'null');
    if (!token || !user) window.location.href = '/';

    const params = new URLSearchParams(location.search);
    const genre = params.get('genre') || '';

    if (!genre) window.location.href = '/dashboard.html';

    document.title = `${GENRE_DISPLAY[genre] || genre.toUpperCase()} — MyMusicSave`;
    document.getElementById('genre-name').textContent = GENRE_DISPLAY[genre] || genre.toUpperCase();

    let allAlbums = [];
    let sortMode = 'year';

    // ── 데이터 로드 ──────────────────────────────────────
    async function init() {
      const userRes = await fetch(
        `${SUPABASE_URL}/rest/v1/users?spotify_id=eq.${user.spotify_id}&select=id`,
        { headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY } }
      );
      const users = await userRes.json();
      if (!users.length) return;
      const userId = users[0].id;

      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/albums?user_id=eq.${userId}&genre=eq.${genre}&select=*`,
        { headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY } }
      );
      allAlbums = await res.json();

      // 통계
      const artistSet = new Set(allAlbums.map(a => a.artist).filter(Boolean));
      document.getElementById('stat-albums').textContent = allAlbums.length;
      document.getElementById('stat-artists').textContent = artistSet.size;

      if (!allAlbums.length) {
        document.getElementById('album-grid').innerHTML = `<div class="genre-empty">이 장르의 앨범이 없습니다.</div>`;
        return;
      }

      renderGrid();
      renderTopArtists();
    }

    // ── 정렬 ─────────────────────────────────────────────
    function getSorted() {
      const arr = [...allAlbums];
      if (sortMode === 'year') return arr.sort((a, b) => (b.year || 0) - (a.year || 0));
      if (sortMode === 'added') return arr.sort((a, b) => new Date(b.added_at) - new Date(a.added_at));
      if (sortMode === 'artist') return arr.sort((a, b) => (a.artist || '').localeCompare(b.artist || ''));
      if (sortMode === 'title') return arr.sort((a, b) => (a.title || '').localeCompare(b.title || ''));
      return arr;
    }

    // ── 앨범 그리드 렌더 ─────────────────────────────────
    function renderGrid() {
      const grid = document.getElementById('album-grid');
      const sorted = getSorted();
      grid.innerHTML = sorted.map(a => `
        <a class="genre-album-card" href="/album.html?id=${escHtml(a.spotify_album_id)}">
          <div class="genre-album-art">
            ${a.cover_url ? `<img src="${escHtml(a.cover_url)}" alt="${escHtml(a.title)}" loading="lazy">` : ''}
          </div>
          <div class="genre-album-title">${escHtml(a.title)}</div>
          <div class="genre-album-artist">${escHtml(a.artist)}</div>
          ${a.year ? `<div class="genre-album-year">${a.year}</div>` : ''}
        </a>
      `).join('');
    }

    // ── Top Artists 렌더 ─────────────────────────────────
    function renderTopArtists() {
      const counts = {};
      allAlbums.forEach(a => { if (a.artist) counts[a.artist] = (counts[a.artist] || 0) + 1; });
      const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 10);

      document.getElementById('artist-list').innerHTML = sorted.map(([name, count], i) => `
        <a class="artist-row" href="/artist.html?name=${encodeURIComponent(name)}">
          <div class="artist-row-left">
            <span class="artist-rank">${String(i + 1).padStart(2, '0')}</span>
            <span class="artist-name">${escHtml(name)}</span>
          </div>
          <span class="artist-count">${count} albums</span>
        </a>
      `).join('');

      document.getElementById('top-artists-section').style.display = 'block';
    }

    // ── 정렬 버튼 ─────────────────────────────────────────
    document.querySelectorAll('.sort-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        sortMode = btn.dataset.sort;
        renderGrid();
      });
    });

    init();
  </script>
</body>
</html>

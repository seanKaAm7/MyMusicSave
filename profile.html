<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>프로필 — MyMusicSave</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* ── 헤더 ─────────────────────────────────────────── */
    .profile-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 2.5rem;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,10,10,0.95);
      backdrop-filter: blur(16px);
    }
    .profile-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      letter-spacing: 0.12em;
      color: var(--text);
      text-decoration: none;
    }
    .btn-back {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      padding: 0.38rem 0.85rem;
      cursor: pointer;
      font-family: inherit;
      text-transform: uppercase;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }
    .btn-back:hover { color: var(--text); border-color: var(--text); }

    /* ── 레이아웃 ──────────────────────────────────────── */
    .profile-wrap {
      max-width: 640px;
      margin: 0 auto;
      padding: 3rem 2.5rem 6rem;
    }

    /* ── 프로필 섹션 ───────────────────────────────────── */
    .profile-card {
      display: flex;
      align-items: center;
      gap: 2rem;
      padding-bottom: 2.5rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2.5rem;
    }
    .profile-avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .profile-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .profile-avatar-initials {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      color: var(--text-dim);
      letter-spacing: 0.05em;
    }
    .profile-info {}
    .profile-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      letter-spacing: 0.06em;
      line-height: 1;
      margin-bottom: 0.3rem;
    }
    .profile-id {
      font-family: 'Space Mono', monospace;
      font-size: 0.68rem;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      margin-bottom: 1rem;
    }
    .profile-stats {
      display: flex;
      gap: 1.5rem;
    }
    .profile-stat {}
    .profile-stat-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 0.04em;
      line-height: 1;
    }
    .profile-stat-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.58rem;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      margin-top: 0.15rem;
    }

    /* ── 설정 섹션 ─────────────────────────────────────── */
    .settings-section {
      margin-bottom: 2.5rem;
    }
    .settings-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }
    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem 0;
      border-bottom: 1px solid var(--border);
      gap: 1rem;
    }
    .settings-row:first-of-type {
      border-top: 1px solid var(--border);
    }
    .settings-row-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      color: var(--text-dim);
      letter-spacing: 0.04em;
      flex-shrink: 0;
      min-width: 110px;
    }
    .settings-row-value {
      font-family: 'Space Mono', monospace;
      font-size: 0.68rem;
      color: var(--text-muted);
      letter-spacing: 0.04em;
    }
    .settings-connected {
      font-family: 'Space Mono', monospace;
      font-size: 0.62rem;
      color: #1DB954;
      letter-spacing: 0.08em;
    }

    /* ── 인풋 행 ───────────────────────────────────────── */
    .settings-input-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex: 1;
      justify-content: flex-end;
    }
    .settings-input {
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.04em;
      padding: 0.35rem 0.7rem;
      width: 140px;
      outline: none;
    }
    .settings-input:focus {
      border-color: var(--text-dim);
    }
    .settings-input::placeholder {
      color: var(--text-muted);
    }
    .btn-save {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.08em;
      padding: 0.35rem 0.7rem;
      cursor: pointer;
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .btn-save:hover { border-color: var(--text); color: var(--text); }
    .btn-save.saved { color: #1DB954; border-color: #1DB954; }

    /* ── 위험 구역 ─────────────────────────────────────── */
    .btn-logout {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.9rem;
      letter-spacing: 0.12em;
      padding: 0.55rem 1.4rem;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-logout:hover {
      border-color: #e05555;
      color: #e05555;
    }

    @media (max-width: 600px) {
      .profile-header, .profile-wrap { padding-left: 1.5rem; padding-right: 1.5rem; }
      .profile-card { flex-direction: column; align-items: flex-start; gap: 1.2rem; }
      .settings-input { width: 110px; }
    }
  </style>
</head>
<body>

  <header class="profile-header">
    <a class="profile-logo" href="/dashboard.html">MYMUSICSAVE</a>
    <a class="btn-back" href="/dashboard.html">대시보드</a>
  </header>

  <div class="profile-wrap">

    <!-- 프로필 카드 -->
    <div class="profile-card">
      <div class="profile-avatar" id="avatar">
        <span class="profile-avatar-initials" id="avatar-initials">?</span>
      </div>
      <div class="profile-info">
        <div class="profile-name" id="profile-name">—</div>
        <div class="profile-id" id="profile-id">—</div>
        <div class="profile-stats">
          <div class="profile-stat">
            <div class="profile-stat-num" id="stat-albums">—</div>
            <div class="profile-stat-label">ALBUMS</div>
          </div>
          <div class="profile-stat">
            <div class="profile-stat-num" id="stat-artists">—</div>
            <div class="profile-stat-label">ARTISTS</div>
          </div>
          <div class="profile-stat">
            <div class="profile-stat-num" id="stat-genres">—</div>
            <div class="profile-stat-label">GENRES</div>
          </div>
        </div>
      </div>
    </div>

    <!-- 연결된 서비스 -->
    <div class="settings-section">
      <div class="settings-label">Connected Services</div>

      <div class="settings-row">
        <span class="settings-row-label">Spotify</span>
        <span class="settings-connected">● Connected</span>
      </div>

      <div class="settings-row">
        <span class="settings-row-label">Last.fm</span>
        <div class="settings-input-row">
          <input class="settings-input" id="input-lastfm" type="text" placeholder="username" autocomplete="off" spellcheck="false">
          <button class="btn-save" id="btn-save-lastfm">Save</button>
        </div>
      </div>

      <div class="settings-row">
        <span class="settings-row-label">ListenBrainz</span>
        <div class="settings-input-row">
          <input class="settings-input" id="input-listenbrainz" type="text" placeholder="username" autocomplete="off" spellcheck="false">
          <button class="btn-save" id="btn-save-listenbrainz">Save</button>
        </div>
      </div>
    </div>

    <!-- 계정 -->
    <div class="settings-section">
      <div class="settings-label">Account</div>
      <div class="settings-row">
        <span class="settings-row-label">로그아웃</span>
        <button class="btn-logout" id="btn-logout">Logout</button>
      </div>
    </div>

  </div>

  <script>
    const SUPABASE_URL = 'https://qpofbblbpzexlzejukbj.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFwb2ZiYmxicHpleGx6ZWp1a2JqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDI2ODY4MDgsImV4cCI6MjA1ODI2MjgwOH0.m2mb0hHXMnMUKlJb_sMcmkF5kJJx1jxCDCMBiLFuASI';

    const token = localStorage.getItem('mms_access_token');
    const user = JSON.parse(localStorage.getItem('mms_user') || 'null');
    if (!token || !user) window.location.href = '/';

    // ── 프로필 기본 정보 ─────────────────────────────────
    const name = user.display_name || user.spotify_id || '';
    document.getElementById('profile-name').textContent = name;
    document.getElementById('profile-id').textContent = user.spotify_id ? '@' + user.spotify_id : '';

    const initials = name.slice(0, 2).toUpperCase() || '?';
    document.getElementById('avatar-initials').textContent = initials;

    // Spotify 프로필 사진 시도
    fetch('https://api.spotify.com/v1/me', {
      headers: { 'Authorization': 'Bearer ' + token }
    })
    .then(r => r.ok ? r.json() : null)
    .then(data => {
      if (data?.images?.[0]?.url) {
        const img = document.createElement('img');
        img.src = data.images[0].url;
        img.alt = name;
        const avatar = document.getElementById('avatar');
        avatar.innerHTML = '';
        avatar.appendChild(img);
      }
    })
    .catch(() => {});

    // ── 통계 로드 ────────────────────────────────────────
    async function loadStats() {
      try {
        const userId = user.spotify_id;
        // Supabase에서 user_id 조회
        const userRes = await fetch(
          `${SUPABASE_URL}/rest/v1/users?spotify_id=eq.${userId}&select=id`,
          { headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY } }
        );
        const users = await userRes.json();
        if (!users.length) return;
        const dbUserId = users[0].id;

        const res = await fetch(
          `${SUPABASE_URL}/rest/v1/albums?user_id=eq.${dbUserId}&select=artist,genre`,
          { headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY } }
        );
        if (!res.ok) return;
        const albums = await res.json();

        const artists = new Set(albums.map(a => a.artist).filter(Boolean));
        const genres = new Set(albums.map(a => a.genre).filter(Boolean));

        document.getElementById('stat-albums').textContent = albums.length;
        document.getElementById('stat-artists').textContent = artists.size;
        document.getElementById('stat-genres').textContent = genres.size;
      } catch {}
    }
    loadStats();

    // ── 설정 로드 ────────────────────────────────────────
    const lastfmInput = document.getElementById('input-lastfm');
    const listenbrainzInput = document.getElementById('input-listenbrainz');

    lastfmInput.value = localStorage.getItem('mms_lastfm_username') || '';
    listenbrainzInput.value = localStorage.getItem('mms_listenbrainz_username') || '';

    // ── 저장 버튼 ────────────────────────────────────────
    function flashSaved(btn) {
      btn.textContent = 'Saved';
      btn.classList.add('saved');
      setTimeout(() => {
        btn.textContent = 'Save';
        btn.classList.remove('saved');
      }, 1500);
    }

    document.getElementById('btn-save-lastfm').addEventListener('click', () => {
      const val = lastfmInput.value.trim();
      if (val) localStorage.setItem('mms_lastfm_username', val);
      else localStorage.removeItem('mms_lastfm_username');
      flashSaved(document.getElementById('btn-save-lastfm'));
    });

    document.getElementById('btn-save-listenbrainz').addEventListener('click', () => {
      const val = listenbrainzInput.value.trim();
      if (val) localStorage.setItem('mms_listenbrainz_username', val);
      else localStorage.removeItem('mms_listenbrainz_username');
      flashSaved(document.getElementById('btn-save-listenbrainz'));
    });

    // ── 로그아웃 ─────────────────────────────────────────
    document.getElementById('btn-logout').addEventListener('click', () => {
      localStorage.clear();
      window.location.href = '/';
    });
  </script>
</body>
</html>

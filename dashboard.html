<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>대시보드 — MyMusicSave</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    /* ── HEADER ── */
    .dash-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 2.5rem;
      border-bottom: 1px solid var(--border);
      gap: 1rem;
    }
    .dash-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      letter-spacing: 0.12em;
      color: var(--text);
    }
    .dash-actions {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .btn-sync {
      background: var(--text);
      color: #000;
      border: none;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.95rem;
      letter-spacing: 0.1em;
      padding: 0.45rem 1.2rem;
      cursor: pointer;
    }
    .btn-sync:hover { opacity: 0.85; }
    .btn-sync:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-outline {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      padding: 0.4rem 0.9rem;
      cursor: pointer;
      font-family: inherit;
      text-transform: uppercase;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }
    .btn-outline:hover { color: var(--text); border-color: var(--text); }

    /* ── HERO ── */
    .dash-hero {
      padding: 3.5rem 2.5rem 2.5rem;
      border-bottom: 1px solid var(--border);
    }
    .hero-username {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.8rem, 5vw, 4.5rem);
      line-height: 0.92;
      letter-spacing: 0.04em;
      color: var(--text);
      margin-bottom: 1rem;
    }
    .hero-stats {
      font-family: 'Space Mono', monospace;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      display: flex;
      gap: 0;
    }
    .hero-stat {
      display: flex;
      gap: 0.5rem;
      align-items: baseline;
    }
    .hero-stat + .hero-stat::before {
      content: '·';
      margin: 0 0.75rem;
      color: var(--border);
    }
    .hero-stat-num {
      color: var(--text-dim);
    }
    .sync-status {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.75rem;
      font-family: 'Space Mono', monospace;
      letter-spacing: 0.04em;
    }

    /* ── SECTION WRAPPER ── */
    .dash-section {
      border-bottom: 1px solid var(--border);
      padding: 2rem 2.5rem;
    }
    .dash-section-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      margin-bottom: 1.5rem;
    }

    /* ── GENRE TYPOGRAPHY ── */
    .genre-typo {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 0.5rem 1.2rem;
      line-height: 1.1;
    }
    .genre-typo-item {
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .genre-typo-item:hover { opacity: 0.6; }
    .genre-typo-item.active {
      border-bottom: 2px solid var(--text);
      opacity: 1 !important;
    }
    .genre-typo-count {
      font-family: 'Space Mono', monospace;
      font-size: 0.6em;
      color: var(--text-muted);
      vertical-align: baseline;
      margin-left: 0.15em;
    }

    /* ── ALBUM COVER GRID ── */
    .cover-grid {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 4px;
    }
    .cover-item {
      position: relative;
      aspect-ratio: 1;
      overflow: hidden;
      cursor: pointer;
      background: var(--border);
    }
    .cover-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.25s ease;
    }
    .cover-item:hover img { transform: scale(1.06); }
    .cover-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.75);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0.5rem;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .cover-item:hover .cover-overlay { opacity: 1; }
    .cover-overlay-title {
      font-size: 0.62rem;
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 0.06em;
      line-height: 1.2;
      color: #fff;
    }
    .cover-overlay-artist {
      font-size: 0.55rem;
      color: rgba(255,255,255,0.55);
      margin-top: 0.15rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── BOTTOM SPLIT ── */
    .dash-bottom {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border);
    }
    .dash-bottom-col {
      background: var(--bg);
      padding: 2rem 2.5rem;
    }

    /* ── YEAR CHART ── */
    .chart-wrap {
      position: relative;
      height: 180px;
    }

    /* ── ARTIST LIST ── */
    .artist-poster-list {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .artist-poster-row {
      display: flex;
      align-items: baseline;
      gap: 1rem;
      padding: 0.55rem 0;
      border-bottom: 1px solid var(--border);
    }
    .artist-poster-row:last-child { border-bottom: none; }
    .artist-poster-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      line-height: 1;
      color: var(--text-muted);
      min-width: 2rem;
      text-align: right;
    }
    .artist-poster-name {
      flex: 1;
      font-size: 0.88rem;
      color: var(--text-dim);
    }
    .artist-poster-count {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-muted);
    }

    @media (max-width: 900px) {
      .cover-grid { grid-template-columns: repeat(5, 1fr); }
      .dash-bottom { grid-template-columns: 1fr; }
    }
    @media (max-width: 600px) {
      .cover-grid { grid-template-columns: repeat(4, 1fr); }
      .dash-hero { padding: 2rem 1.5rem; }
      .dash-section, .dash-bottom-col { padding: 1.5rem; }
      .dash-header { padding: 1rem 1.5rem; }
    }
  </style>
</head>
<body>

  <header class="dash-header">
    <div class="dash-logo">MYMUSICSAVE</div>
    <div class="dash-actions">
      <button class="btn-sync" id="btn-sync" disabled>동기화</button>
      <a class="btn-outline" href="/map.html">뮤직맵</a>
      <button class="btn-outline" id="btn-logout">로그아웃</button>
    </div>
  </header>

  <section class="dash-hero">
    <div class="hero-username" id="hero-username">—</div>
    <div class="hero-stats" id="hero-stats">
      <span class="hero-stat"><span class="hero-stat-num" id="stat-albums">—</span> ALBUMS</span>
      <span class="hero-stat"><span class="hero-stat-num" id="stat-artists">—</span> ARTISTS</span>
      <span class="hero-stat"><span class="hero-stat-num" id="stat-genres">—</span> GENRES</span>
    </div>
    <div class="sync-status" id="sync-status"></div>
  </section>

  <section class="dash-section">
    <div class="dash-section-label">GENRE</div>
    <div class="genre-typo" id="genre-typo">
      <span style="color:var(--text-muted);font-size:.85rem;font-family:'Space Mono',monospace">동기화 후 표시됩니다</span>
    </div>
  </section>

  <section class="dash-section">
    <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:1.5rem">
      <div class="dash-section-label" style="margin-bottom:0" id="albums-label">ALBUMS</div>
      <span id="albums-count" style="font-family:'Space Mono',monospace;font-size:0.65rem;color:var(--text-muted)"></span>
    </div>
    <div class="cover-grid" id="cover-grid">
      <span style="color:var(--text-muted);font-size:.85rem;font-family:'Space Mono',monospace;grid-column:1/-1">동기화 후 표시됩니다</span>
    </div>
  </section>

  <div class="dash-bottom">
    <div class="dash-bottom-col">
      <div class="dash-section-label">YEAR</div>
      <div class="chart-wrap"><canvas id="chart-year"></canvas></div>
    </div>
    <div class="dash-bottom-col">
      <div class="dash-section-label">ARTIST TOP 10</div>
      <div class="artist-poster-list" id="artist-list">
        <span style="color:var(--text-muted);font-size:.85rem;font-family:'Space Mono',monospace">동기화 후 표시됩니다</span>
      </div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('mms_access_token');
    const user = JSON.parse(localStorage.getItem('mms_user') || 'null');
    if (!token || !user) window.location.href = '/';

    document.getElementById('hero-username').textContent = (user?.display_name || '').toUpperCase();
    document.getElementById('btn-sync').disabled = false;

    document.getElementById('btn-logout').addEventListener('click', () => {
      localStorage.clear();
      window.location.href = '/';
    });

    document.getElementById('btn-sync').addEventListener('click', syncLibrary);

    async function syncLibrary() {
      const btn = document.getElementById('btn-sync');
      const status = document.getElementById('sync-status');
      btn.disabled = true;
      btn.textContent = '동기화 중...';
      status.textContent = 'Spotify 보관함을 불러오는 중...';

      try {
        const res = await fetch('/.netlify/functions/sync', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            access_token: localStorage.getItem('mms_access_token'),
            refresh_token: localStorage.getItem('mms_refresh_token'),
            spotify_id: user.spotify_id
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        status.textContent = `동기화 완료 — 앨범 ${data.count}장`;
        loadDashboard();
      } catch (err) {
        status.textContent = '오류: ' + err.message;
      } finally {
        btn.disabled = false;
        btn.textContent = '동기화';
      }
    }

    const SUPABASE_URL = 'https://aanldsddamkjrziefhuf.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFhbmxkc2RkYW1ranJ6aWVmaHVmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMzg3NDYsImV4cCI6MjA4OTgxNDc0Nn0.N7uKqkjxrAtjvumwW-W5VH5qxCE4RtxKymNWfP097iY';

    async function loadDashboard() {
      const userRes = await fetch(
        `${SUPABASE_URL}/rest/v1/users?spotify_id=eq.${user.spotify_id}&select=id`,
        { headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY } }
      );
      const users = await userRes.json();
      if (!users.length) return;
      const userId = users[0].id;

      const albumsRes = await fetch(
        `${SUPABASE_URL}/rest/v1/albums?user_id=eq.${userId}&select=*&order=added_at.desc`,
        { headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY } }
      );
      const albums = await albumsRes.json();
      if (!albums.length) return;

      const artistSet = [...new Set(albums.map(a => a.artist))];
      const genreSet = [...new Set(albums.map(a => a.genre).filter(Boolean))];
      document.getElementById('stat-albums').textContent = albums.length;
      document.getElementById('stat-artists').textContent = artistSet.length;
      document.getElementById('stat-genres').textContent = genreSet.length;

      allAlbums = albums;
      activeGenre = null;
      renderGenreTypo(albums);
      renderCoverGrid(albums);
      renderYearChart(albums);
      renderArtistList(albums);
    }

    let allAlbums = [];
    let activeGenre = null;

    function renderGenreTypo(albums) {
      const counts = {};
      albums.forEach(a => { if (a.genre) counts[a.genre] = (counts[a.genre] || 0) + 1; });
      const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
      if (!sorted.length) return;

      const max = sorted[0][1];
      const min = sorted[sorted.length - 1][1];
      const minSize = 1.4, maxSize = 5.5;

      const container = document.getElementById('genre-typo');
      container.innerHTML = sorted.map(([genre, count]) => {
        const ratio = max === min ? 1 : (count - min) / (max - min);
        const size = minSize + ratio * (maxSize - minSize);
        const lightness = 40 + Math.round(ratio * 40);
        return `<span class="genre-typo-item" data-genre="${escHtml(genre)}" style="font-size:${size.toFixed(2)}rem;color:hsl(0,0%,${lightness}%)">
          ${escHtml(genre.toUpperCase())}<span class="genre-typo-count">${count}</span>
        </span>`;
      }).join('');

      container.querySelectorAll('.genre-typo-item').forEach(el => {
        el.addEventListener('click', () => {
          const genre = el.dataset.genre;
          if (activeGenre === genre) {
            activeGenre = null;
            el.classList.remove('active');
          } else {
            container.querySelectorAll('.genre-typo-item').forEach(e => e.classList.remove('active'));
            activeGenre = genre;
            el.classList.add('active');
          }
          renderCoverGrid(allAlbums);
        });
      });
    }

    function renderCoverGrid(albums) {
      const label = document.getElementById('albums-label');
      const countEl = document.getElementById('albums-count');
      let filtered;
      if (activeGenre) {
        filtered = albums.filter(a => a.genre === activeGenre);
        label.textContent = activeGenre.toUpperCase();
        countEl.textContent = `${filtered.length}장`;
      } else {
        filtered = albums.slice(0, 20);
        label.textContent = 'RECENT ALBUMS';
        countEl.textContent = '';
      }

      const grid = document.getElementById('cover-grid');
      if (!filtered.length) {
        grid.innerHTML = `<span style="color:var(--text-muted);font-size:.85rem;font-family:'Space Mono',monospace;grid-column:1/-1">앨범 없음</span>`;
        return;
      }
      grid.innerHTML = filtered.map(a => `
        <div class="cover-item" onclick="location.href='/album.html?id=${a.spotify_album_id}'">
          <img src="${a.cover_url || ''}" alt="${escHtml(a.title)}" onerror="this.style.display='none'">
          <div class="cover-overlay">
            <div class="cover-overlay-title">${escHtml(a.title)}</div>
            <div class="cover-overlay-artist">${escHtml(a.artist)}</div>
          </div>
        </div>
      `).join('');
    }

    let yearChartInstance = null;
    function renderYearChart(albums) {
      const counts = {};
      albums.forEach(a => { if (a.year) counts[a.year] = (counts[a.year] || 0) + 1; });
      const sorted = Object.entries(counts).sort((a, b) => a[0] - b[0]);

      const values = sorted.map(([, v]) => v);
      const maxVal = Math.max(...values);
      const colors = values.map(v => {
        const ratio = v / maxVal;
        const alpha = 0.15 + ratio * 0.75;
        return `rgba(255,255,255,${alpha.toFixed(2)})`;
      });

      if (yearChartInstance) yearChartInstance.destroy();
      yearChartInstance = new Chart(document.getElementById('chart-year'), {
        type: 'bar',
        data: {
          labels: sorted.map(([k]) => k),
          datasets: [{ data: values, backgroundColor: colors, borderRadius: 1 }]
        },
        options: {
          plugins: { legend: { display: false } },
          scales: {
            x: {
              ticks: { color: '#555', font: { family: "'Bebas Neue'", size: 10 }, maxRotation: 0 },
              grid: { display: false },
              border: { color: '#2a2a2a' }
            },
            y: {
              ticks: { color: '#444', font: { size: 9 }, maxTicksLimit: 4 },
              grid: { color: '#161616' },
              border: { display: false }
            }
          }
        }
      });
    }

    function renderArtistList(albums) {
      const counts = {};
      albums.forEach(a => { counts[a.artist] = (counts[a.artist] || 0) + 1; });
      const top10 = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 10);
      document.getElementById('artist-list').innerHTML = top10.map(([name, count], i) => `
        <div class="artist-poster-row">
          <span class="artist-poster-num">${String(i + 1).padStart(2, '0')}</span>
          <span class="artist-poster-name">${escHtml(name)}</span>
          <span class="artist-poster-count">${count}</span>
        </div>
      `).join('');
    }

    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    loadDashboard();
  </script>
</body>
</html>

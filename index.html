<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyMusicSave — 내 음악 보관함</title>
  <meta name="description" content="Spotify 보관함을 자동으로 불러와 시각화하는 개인 음악 통계 서비스">
  <link rel="stylesheet" href="styles.css">
  <style>
    .login-hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 90vh;
      gap: 2rem;
      text-align: center;
    }
    .login-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 10vw, 7rem);
      letter-spacing: 0.05em;
      line-height: 1;
      color: var(--fg);
    }
    .login-logo span {
      color: var(--accent);
    }
    .login-sub {
      font-size: 0.95rem;
      color: var(--muted);
      max-width: 360px;
      line-height: 1.6;
    }
    .btn-spotify {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      background: #1DB954;
      color: #000;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 0.1em;
      padding: 0.85rem 2rem;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .btn-spotify:hover { opacity: 0.85; }
    .login-features {
      display: flex;
      gap: 2.5rem;
      margin-top: 1rem;
    }
    .login-feature {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
    }
    .login-feature-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      color: var(--accent);
    }
    .login-feature-desc {
      font-size: 0.78rem;
      color: var(--muted);
    }
    @media (max-width: 600px) {
      .login-features { flex-direction: column; gap: 1rem; align-items: center; }
    }
  </style>
</head>
<body>
  <main class="page-wrapper">
    <div class="login-hero">
      <div class="login-logo">MY<span>MUSIC</span>SAVE</div>
      <p class="login-sub">Spotify 보관함을 한 번에 불러와<br>장르, 연도, 아티스트별로 탐색하세요.</p>
      <a class="btn-spotify" id="btn-login" href="#">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
        </svg>
        Spotify로 로그인
      </a>
      <div class="login-features">
        <div class="login-feature">
          <div class="login-feature-label">시각화</div>
          <div class="login-feature-desc">장르 비율 · 연도 분포 · 아티스트 순위</div>
        </div>
        <div class="login-feature">
          <div class="login-feature-label">탐색</div>
          <div class="login-feature-desc">보관함 전체를 필터로 빠르게 탐색</div>
        </div>
        <div class="login-feature">
          <div class="login-feature-label">공유</div>
          <div class="login-feature-desc">내 보관함을 링크 하나로 공유</div>
        </div>
      </div>
    </div>
  </main>
  <script>
    // 이미 로그인돼 있으면 대시보드로
    if (localStorage.getItem('mms_access_token')) {
      window.location.href = '/dashboard.html';
    }

    const CLIENT_ID = 'b00f079fd9434c97884bbfc791171eb5';
    const REDIRECT_URI = window.location.origin + '/callback.html';
    const SCOPES = 'user-library-read user-read-private user-read-email';

    document.getElementById('btn-login').href =
      'https://accounts.spotify.com/authorize?' +
      new URLSearchParams({
        client_id: CLIENT_ID,
        response_type: 'code',
        redirect_uri: REDIRECT_URI,
        scope: SCOPES
      });
  </script>
</body>
</html>
